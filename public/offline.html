<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <title>Offline · Lurvox</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #09090b;
      color: #fafafa;
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 1.6rem; letter-spacing: -0.02em; }
    p { margin: 0 0 20px; color: #c4c4cc; line-height: 1.5; max-width: 28rem; }
    button {
      min-height: 48px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #f97316;
      color: #09090b;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>You're offline</h1>
    <p>Lurvox needs a connection for live coaching data. Reconnect, then try again.</p>
    <button type="button" onclick="location.reload()">Retry</button>
  </main>
</body>
</html>
